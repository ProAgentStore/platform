name: PAGS
options:
  bundleIdPrefix: online.proagentstore
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  PAGS:
    type: application
    platform: iOS
    sources:
      - path: PAGS
    settings:
      base:
        INFOPLIST_FILE: PAGS/Info.plist
        DEVELOPMENT_TEAM: 55DT52UQXE
        PRODUCT_BUNDLE_IDENTIFIER: online.proagentstore.app
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        VERSIONING_SYSTEM: apple-generic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  PAGSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PAGSTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PAGS
