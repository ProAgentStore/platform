name: Publish to npm
on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (sdk or cli)'
        required: true
        type: choice
        options:
          - sdk
          - cli

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        if: inputs.package == 'sdk'
        run: cd packages/sdk && npx tsc

      - name: Build CLI
        if: inputs.package == 'cli'
        run: cd packages/cli && npx tsup src/index.ts --format esm --dts

      - name: Publish
        run: cd packages/${{ inputs.package }} && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
