<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ProAgentStore</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--font-body:'Manrope',system-ui,sans-serif;--font-display:'Fraunces',Georgia,serif;--paper:#0a0a0a;--panel:#141414;--ink:#fafafa;--muted:#a3a3a3;--muted-soft:#737373;--accent:#7c3aed;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--line:#262626;--radius:0.75rem}
    body{font-family:var(--font-body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
    a{color:var(--accent);text-decoration:none}
    .container{max-width:1100px;margin:0 auto;padding:1.5rem}
    header{border-bottom:1px solid var(--line);padding:0.75rem 1.5rem;display:flex;align-items:center;gap:1rem}
    header h1{font-family:var(--font-display);font-size:1.15rem;font-weight:700;color:var(--red)}
    header nav{margin-left:auto;display:flex;gap:1rem;font-size:0.85rem}
    header nav a{color:var(--muted)}

    .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.75rem;margin-bottom:2rem}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:1rem;text-align:center}
    .stat .num{font-size:1.8rem;font-weight:700}
    .stat .label{font-size:0.78rem;color:var(--muted);margin-top:0.2rem}

    table{width:100%;border-collapse:collapse;font-size:0.85rem;margin-bottom:2rem}
    th{text-align:left;padding:0.6rem;border-bottom:2px solid var(--line);color:var(--muted);font-weight:600;font-size:0.75rem;text-transform:uppercase}
    td{padding:0.5rem 0.6rem;border-bottom:1px solid var(--line)}
    .badge{font-size:0.7rem;padding:0.1rem 0.4rem;border-radius:999px;font-weight:600}
    .badge-published{background:rgba(34,197,94,0.15);color:var(--green)}
    .badge-draft{background:rgba(234,179,8,0.15);color:var(--yellow)}
    .badge-active{background:rgba(34,197,94,0.15);color:var(--green)}

    h2{font-family:var(--font-display);font-size:1.15rem;font-weight:700;margin-bottom:1rem}
    .section{margin-bottom:2rem}
    .loading{color:var(--muted);font-size:0.88rem}
    .error{color:var(--red)}
  </style>
</head>
<body>
  <header>
    <span style="font-size:1.2rem">&#9889;</span>
    <h1>Admin Dashboard</h1>
    <nav>
      <a href="/">Store</a>
      <a href="/console/">Console</a>
    </nav>
  </header>

  <div class="container">
    <div id="auth-gate" style="text-align:center;padding:3rem;color:var(--muted)">Checking admin access...</div>
    <div id="dashboard" style="display:none">
      <div class="stats" id="stats"></div>

      <div class="section">
        <h2>All Agents</h2>
        <table id="agents-table"><thead><tr><th>Slug</th><th>Name</th><th>Type</th><th>Category</th><th>Visibility</th><th>Creator</th></tr></thead><tbody></tbody></table>
      </div>

      <div class="section">
        <h2>All Users</h2>
        <table id="users-table"><thead><tr><th>Login</th><th>Roles</th><th>Agents</th><th>Subscriptions</th><th>Joined</th></tr></thead><tbody></tbody></table>
      </div>

      <div class="section">
        <h2>Recent Usage</h2>
        <table id="usage-table"><thead><tr><th>Event</th><th>Agent</th><th>User</th><th>Time</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://api.proagentstore.online';
    const token = localStorage.getItem('pags:session');

    async function api(path) {
      const res = await fetch(`${API}${path}`, { headers: { Authorization: `Bearer ${token}` } });
      return res.json();
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    async function load() {
      if (!token) { document.getElementById('auth-gate').textContent = 'Sign in at /console/ first'; return; }

      const me = await api('/v1/auth/me');
      if (!me.roles?.includes('admin')) {
        document.getElementById('auth-gate').innerHTML = '<span class="error">Admin access required</span>';
        return;
      }

      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('dashboard').style.display = '';

      // Stats
      const agents = await api('/v1/agents');
      const allAgents = agents.agents || [];

      // Get users + usage via admin-specific queries (reuse public endpoints for now)
      const stats = document.getElementById('stats');
      stats.innerHTML = `
        <div class="stat"><div class="num">${allAgents.length}</div><div class="label">Published Agents</div></div>
        <div class="stat"><div class="num">${allAgents.filter(a => a.store_type === 'agent').length}</div><div class="label">Agents</div></div>
        <div class="stat"><div class="num">${allAgents.filter(a => a.store_type === 'worker').length}</div><div class="label">Workers</div></div>
        <div class="stat"><div class="num">${allAgents.filter(a => a.store_type === 'tool').length}</div><div class="label">Tools</div></div>
      `;

      // Agents table
      const tbody = document.querySelector('#agents-table tbody');
      for (const a of allAgents) {
        tbody.innerHTML += `<tr>
          <td><a href="/agents/${esc(a.slug)}/">${esc(a.slug)}</a></td>
          <td>${esc(a.name)}</td>
          <td>${esc(a.store_type || 'agent')}</td>
          <td>${esc(a.category)}</td>
          <td><span class="badge badge-${a.visibility}">${a.visibility}</span></td>
          <td><a href="/developers/${esc(a.creator_login)}/">${esc(a.creator_login)}</a></td>
        </tr>`;
      }
    }

    load();
  </script>
</body>
</html>
