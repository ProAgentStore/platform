        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"

  /v1/notifications/{id}/read:
    post:
      summary: Mark notification as read
      operationId: markNotificationRead
      tags: [Notifications]
      parameters:
        - name: id
          in: path
          required: true
