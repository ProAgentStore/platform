                    format: date-time
                  subscriber_count:
                    type: integer
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/public/agents/{id}/try:
    post:
      summary: Trial chat (no auth)
      description: |
        Try a published agent without creating an account. Uses an ephemeral Durable
        Object keyed by agent + session. Limited to 20 messages per session.
      operationId: tryAgent
      security: []
      tags: [Public]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID or slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                sessionId:
                  type: string
                  description: Opaque session identifier from a previous response; omit to start a new trial
      responses:
        "200":
          description: Agent reply with session ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                  sessionId:
                    type: string
        "429":
          description: Trial limit reached (20 messages)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  sessionId:
                    type: string

  /v1/public/agents/{id}/import-gdoc:
    post:
      summary: Import Google Doc into agent knowledge base
      description: |
        Fetch a publicly shared Google Doc and add its content as a knowledge document.
        Requires a valid PAGS session token (Bearer).
      operationId: importGoogleDoc
      tags: [Public]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [docUrl]
              properties:
                docUrl:
                  type: string
                  format: uri
                  example: "https://docs.google.com/document/d/1BxiMV.../edit"
                  description: URL of a publicly accessible Google Doc
      responses:
        "201":
          description: Document ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDocument"
        "400":
          description: Invalid URL or inaccessible document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Auth required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/public/developers/{login}:
    get:
      summary: Developer public profile
      description: Public creator profile with their published agents.
      operationId: getDeveloperProfile
      security: []
      tags: [Public]
      parameters:
        - name: login
          in: path
          required: true
          schema:
            type: string
          description: GitHub login of the creator
      responses:
        "200":
          description: Developer profile and their agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  developer:
                    type: object
                    properties:
                      login:
                        type: string
                      name:
                        type: string
                      avatar:
                        type: string
                        format: uri
                      bio:
                        type: string
                      website:
                        type: string
                      twitter:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
                      agentCount:
                        type: integer
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentSummary"
        "404":
          description: Developer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/public/webhook/{instanceId}/ingest:
    post:
      summary: Webhook knowledge ingestion
      description: |
        Add a document to an instance's knowledge base via webhook.
        Intended for Zapier, Make, n8n, and similar automation tools.
        Auth: Bearer token (the instance owner's PAGS session token).
      operationId: webhookIngest
      tags: [Public]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                content:
                  type: string
                source:
                  type: string
                  default: webhook
                sourceUrl:
                  type: string
                  format: uri
      responses:
        "201":
          description: Document ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDocument"
        "400":
          description: title and content required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Bearer token required or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Instance not found or not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
