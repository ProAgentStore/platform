          description: Document added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDocument"

  /v1/agents/{id}/knowledge/{docId}:
    delete:
      summary: Delete knowledge document
      operationId: deleteAgentKnowledge
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: docId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"

  /v1/agents/{id}/knowledge/ingest-url:
    post:
      summary: Ingest URL into knowledge base
      description: Fetches a URL and adds its content as a knowledge document.
      operationId: ingestAgentKnowledgeUrl
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                title:
                  type: string
      responses:
        "201":
          description: URL ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDocument"

  # ── Run ───────────────────────────────────────────────────────────────────

  /v1/agents/{id}/run:
    post:
      summary: Execute agent via Workers AI
      description: Run the agent's model directly with a structured input. Logs execution and tracks usage for creator payouts.
      operationId: runAgent
      tags: [Run]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID or slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input:
                  type: object
                  description: Model-specific input (e.g. messages array for chat models)
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Raw Workers AI model output
                  executionId:
                    type: string
                    format: uuid
                  durationMs:
                    type: integer
        "400":
          description: input required or agent not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agents/{id}/executions:
    get:
      summary: Get execution history
      description: List the authenticated user's execution history for a given agent.
      operationId: getAgentExecutions
      tags: [Run]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Execution list
          content:
            application/json:
              schema:
                type: object
                properties:
                  executions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Execution"

  # ── Analytics ─────────────────────────────────────────────────────────────

  /v1/agents/{id}/analytics:
    get:
      summary: Get agent analytics
      description: Per-agent usage stats. Owner or admin only.
      operationId: getAgentAnalytics
      tags: [Analytics]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID or slug
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscribers:
                    type: integer
                  totalExecutions:
                    type: integer
                  totalChats:
                    type: integer
                  dailyUsage:
                    type: array
                    items:
                      $ref: "#/components/schemas/DailyUsage"
                  recentExecutions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Execution"
        "403":
          description: Not your agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Versions ──────────────────────────────────────────────────────────────

  /v1/agents/{id}/versions:
    get:
      summary: List versions
      description: List all version snapshots for an agent. Owner or admin only.
      operationId: listAgentVersions
      tags: [Versions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Version"
        "403":
          description: Not your agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Save version snapshot
      description: Snapshot the current Durable Object state as a named version.
      operationId: createAgentVersion
      tags: [Versions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  example: "Added customer FAQ docs"
      responses:
        "201":
          description: Version saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  version:
                    type: integer
        "403":
          description: Not your agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agents/{id}/versions/{versionId}/rollback:
    post:
      summary: Rollback to version
      description: Restore the agent's Durable Object state to a previous snapshot.
      operationId: rollbackAgentVersion
      tags: [Versions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Rolled back successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  rolledBackTo:
                    type: string
                    format: uuid
        "403":
          description: Not your agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Export / Import ───────────────────────────────────────────────────────

  /v1/agents/{id}/export:
    get:
      summary: Export agent backup
      description: Download a full JSON backup of the agent's config, DO state, knowledge base, and memory.
      operationId: exportAgent
      tags: [Export]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent backup
          content:
            application/json:
              schema:
                type: object
                properties:
                  exportVersion:
                    type: integer
                    example: 1
                  exportedAt:
                    type: string
                    format: date-time
                  agent:
                    type: object
                    properties:
                      slug:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                      category:
                        type: string
                      storeType:
                        type: string
                      model:
                        type: string
                  state:
                    $ref: "#/components/schemas/AgentState"
                  knowledge:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeDocument"
                  memory:
                    type: array
                    items:
                      type: object
        "403":
          description: Not your agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agents/{id}/import:
    post:
      summary: Import agent backup
      description: Restore an agent from a JSON backup. Overwrites current state, knowledge, and memory.
      operationId: importAgent
      tags: [Export]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                exportVersion:
                  type: integer
                agent:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                    category:
                      type: string
                    model:
                      type: string
                state:
                  $ref: "#/components/schemas/AgentState"
                knowledge:
                  type: array
                  items:
                    $ref: "#/components/schemas/KnowledgeDocument"
                memory:
                  type: array
                  items:
                    type: object
                    required: [key, type, content]
                    properties:
                      key:
                        type: string
                      type:
                        type: string
                      content:
                        type: string
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  restored:
                    type: object
                    properties:
                      knowledge:
                        type: integer
                      memory:
                        type: integer
                      state:
                        type: boolean
        "403":
          description: Not your agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Instances ─────────────────────────────────────────────────────────────

  /v1/instances/{agentId}/subscribe:
    post:
      summary: Subscribe to agent
      description: |
        Subscribe to a published agent. Creates a personal instance with its own
        Durable Object pre-seeded from the template agent's state and knowledge base.
        Also creates a subscription record and notifies the creator.
      operationId: subscribeToAgent
      tags: [Instances]
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID or slug
      responses:
        "201":
          description: Instance created
          content:
            application/json:
              schema:
                type: object
                properties:
                  instanceId:
                    type: string
                    format: uuid
                  agentId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: active
        "404":
          description: Agent not found or not published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Already subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/instances/my/instances:
    get:
      summary: List my instances
      description: List all agent instances the authenticated user is subscribed to.
      operationId: listMyInstances
      tags: [Instances]
      responses:
        "200":
          description: Subscribed instances
          content:
            application/json:
              schema:
                type: object
                properties:
                  instances:
                    type: array
                    items:
                      $ref: "#/components/schemas/Instance"

  /v1/instances/{instanceId}/chat:
    post:
      summary: Chat with my instance
      description: Send a message to the user's personal instance Durable Object.
      operationId: chatWithInstance
      tags: [Instances]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
      responses:
        "200":
          description: Agent reply
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
        "400":
          description: message required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/instances/{instanceId}/messages:
    get:
      summary: Get instance messages
      operationId: getInstanceMessages
      tags: [Instances]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Message history
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
        "404":
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/instances/{instanceId}/knowledge:
    get:
      summary: Get instance knowledge base
      operationId: getInstanceKnowledge
      tags: [Instances]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Knowledge documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeDocument"
    post:
      summary: Add document to instance knowledge base
      operationId: addInstanceKnowledge
      tags: [Instances]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeDocument"
      responses:
        "201":
          description: Document added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDocument"
        "404":
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/instances/{instanceId}/knowledge/{docId}:
    delete:
      summary: Delete document from instance knowledge base
      operationId: deleteInstanceKnowledge
      tags: [Instances]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: docId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "404":
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/instances/{instanceId}/knowledge/ingest-url:
    post:
      summary: Ingest URL into instance knowledge base
      operationId: ingestInstanceKnowledgeUrl
      tags: [Instances]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                title:
                  type: string
      responses:
        "201":
          description: URL ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDocument"
        "404":
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/instances/{instanceId}/cancel:
    post:
      summary: Cancel subscription
      description: Deactivate the instance and mark the subscription as canceled.
      operationId: cancelInstance
      tags: [Instances]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Subscription canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "404":
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Keys ──────────────────────────────────────────────────────────────────

  /v1/keys/providers:
    get:
      summary: List supported AI providers
      description: Returns all AI providers supported by the key vault and proxy (public).
      operationId: listProviders
      security: []
      tags: [Keys]
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Provider"

  /v1/keys/status:
    get:
      summary: Get my key status
      description: Shows which providers the authenticated user has stored keys for.
      operationId: getKeyStatus
      tags: [Keys]
      responses:
        "200":
          description: Key status per provider
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        hasKey:
                          type: boolean
                        createdAt:
                          type: string
                          format: date-time
                          nullable: true
                        lastUsedAt:
                          type: string
                          format: date-time
                          nullable: true

  /v1/keys/{provider}:
    put:
      summary: Store API key
      description: Encrypt and store an API key for the given provider. Cloudflare Workers AI also requires accountId so inference bills to the user's Cloudflare account.
      operationId: storeKey
      tags: [Keys]
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [openai, anthropic, google, openrouter, groq, together, cloudflare]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
                  description: The raw API key or token (stored encrypted with AES-256-GCM)
                accountId:
                  type: string
                  description: Required for provider=cloudflare. Cloudflare account ID used for Workers AI billing.
      responses:
        "200":
          description: Key stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  provider:
                    type: string
        "400":
          description: Unknown provider or invalid key format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete API key
      description: Remove the stored key for a provider.
      operationId: deleteKey
      tags: [Keys]
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"

  /v1/keys/proxy/{host}/{path}:
    post:
      summary: Proxy AI API call
      description: |
        Inject the user's stored key and forward the request to an upstream AI provider.
        The `host` segment identifies the provider (e.g. `api.openai.com`).
        Everything after the host becomes the upstream path.

        Example: `POST /v1/keys/proxy/api.openai.com/v1/chat/completions`

        Rate limit: 100 calls/hour per user.
      operationId: proxyAiCall
      tags: [Keys]
      parameters:
        - name: host
          in: path
          required: true
          schema:
            type: string
          example: api.openai.com
          description: Upstream AI API host
        - name: path
          in: path
          required: true
          schema:
            type: string
          example: v1/chat/completions
          description: Path on the upstream API
      requestBody:
        description: Request body forwarded verbatim to the upstream API
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Upstream API response forwarded
        "400":
          description: Unsupported host or no key stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limit exceeded (100 calls/hour)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Dashboard ─────────────────────────────────────────────────────────────

  /v1/dashboard/usage:
    get:
      summary: Subscriber usage dashboard
      description: Aggregate usage stats for the authenticated user across all their agent instances.
      operationId: getDashboardUsage
      tags: [Dashboard]
      responses:
        "200":
          description: Usage summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeInstances:
                    type: integer
                  totalChats:
                    type: integer
                  totalExecutions:
                    type: integer
                  dailyUsage:
                    type: array
                    items:
                      $ref: "#/components/schemas/DailyUsage"
                  usageByAgent:
                    type: array
                    items:
                      type: object
                      properties:
                        agent_id:
                          type: string
                        name:
                          type: string
                        slug:
                          type: string
                        count:
                          type: integer

  /v1/dashboard/creator:
    get:
      summary: Creator dashboard
      description: Aggregate stats across all agents owned by the authenticated user.
      operationId: getDashboardCreator
      tags: [Dashboard]
      responses:
        "200":
          description: Creator summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalAgents:
                    type: integer
                  totalSubscribers:
                    type: integer
                  totalUsage:
                    type: integer
                  agents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        slug:
                          type: string
                        name:
                          type: string
                        subscribers:
                          type: integer
                        usage_count:
                          type: integer

  # ── Notifications ─────────────────────────────────────────────────────────

