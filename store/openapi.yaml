openapi: 3.1.0

info:
  title: ProAgentStore API
  description: |
    REST API for ProAgentStore — server-powered AI agents on Cloudflare Workers.
    Agents are backed by Durable Objects; each user gets a personal instance with
    isolated memory, knowledge base, and message history.

    **Auth:** All protected endpoints require a Bearer token in the `Authorization`
    header. Obtain a token via `POST /v1/auth/exchange` (FAS OAuth flow) or
    `POST /v1/auth/github` (direct GitHub OAuth).
  version: 1.0.0
  contact:
    url: https://proagentstore.online

servers:
  - url: https://api.proagentstore.online
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication and user profile
  - name: Agents
    description: Agent CRUD, listing, and cloning
  - name: Chat
    description: Messaging, memory, tasks, state, and knowledge base for template agents
  - name: Instances
    description: User subscriptions and per-instance chat, knowledge, and lifecycle
  - name: Run
    description: Direct Workers AI execution and execution history
  - name: Keys
    description: Encrypted user API key vault and AI provider proxy
  - name: Analytics
    description: Per-agent usage analytics (owner only)
  - name: Dashboard
    description: Subscriber usage dashboard and creator aggregate stats
  - name: Notifications
    description: In-app notification inbox
  - name: Versions
    description: Agent version snapshots and rollback
  - name: Export
    description: Agent backup export and import
  - name: Public
    description: Unauthenticated store browsing, trial chat, and webhook ingestion
  - name: Billing
    description: Subscription status

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Success:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true

    User:
      type: object
      properties:
        id:
          type: string
        login:
          type: string
        name:
          type: string
        avatar:
          type: string
          format: uri
        roles:
          type: array
          items:
            type: string
          example: [user, creator]
        hasSubscription:
          type: boolean
        bio:
          type: string
        website:
          type: string
        twitter:
          type: string

    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_id:
          type: string
        slug:
          type: string
          example: my-support-agent
        name:
          type: string
          example: Support Agent
        description:
          type: string
        category:
          type: string
          example: general
        store_type:
          type: string
          example: agent
        icon:
          type: string
        icon_bg:
          type: string
          example: "#7c3aed"
        model:
          type: string
          example: "@cf/meta/llama-3.2-3b-instruct"
        visibility:
          type: string
          enum: [draft, published]
        status:
          type: string
          enum: [active, inactive]
        cron_schedule:
          type: string
          nullable: true
          example: "0 9 * * *"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        store_type:
          type: string
        icon:
          type: string
        icon_bg:
          type: string
        model:
          type: string
        status:
          type: string
        creator_login:
          type: string
        creator_avatar:
          type: string
        subscriber_count:
          type: integer

    Instance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, canceled]
        created_at:
          type: string
          format: date-time
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        category:
          type: string
        icon:
          type: string
        icon_bg:
          type: string

    Message:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        timestamp:
          type: string
          format: date-time

    KnowledgeDocument:
      type: object
      required: [title, content]
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        source:
          type: string
          example: manual
        sourceUrl:
          type: string
          format: uri

    AgentState:
      type: object
      properties:
        name:
          type: string
        personality:
          type: string
        goal:
          type: string
        model:
          type: string
        guardrails:
          type: object
        welcomeMessage:
          type: string

    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [pending, in_progress, done]
        created_at:
          type: string
          format: date-time

    Version:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version_num:
          type: integer
        description:
          type: string
        created_at:
          type: string
          format: date-time

    DailyUsage:
      type: object
      properties:
        day:
          type: string
          format: date
        count:
          type: integer

    Execution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        model:
          type: string
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        duration_ms:
          type: integer
        created_at:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        body:
          type: string
        agent_id:
          type: string
          nullable: true
        read:
          type: integer
          enum: [0, 1]
        created_at:
          type: string
          format: date-time

    Provider:
      type: object
      properties:
        id:
          type: string
          example: openai
        name:
          type: string
          example: OpenAI
        docsUrl:
          type: string
          format: uri

paths:

  # ── Health ────────────────────────────────────────────────────────────────

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string

  # ── Auth ──────────────────────────────────────────────────────────────────

  /v1/auth/config:
    get:
      summary: Get OAuth config
      description: Returns the OAuth URL and app ID for starting the GitHub OAuth flow via FAS.
      operationId: getAuthConfig
      security: []
      tags: [Auth]
      responses:
        "200":
          description: OAuth configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  oauth_url:
                    type: string
                    format: uri
                  app_id:
                    type: string
                  response_mode:
                    type: string

  /v1/auth/exchange:
    post:
      summary: Exchange FAS token for PAGS token
      description: |
        Exchange a FreeAppStore session token for a ProAgentStore session token.
        This is the primary auth flow: complete GitHub OAuth on FAS, then call
        this endpoint with the resulting `fas_session` token.
      operationId: exchangeToken
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fas_session]
              properties:
                fas_session:
                  type: string
                  description: Bearer token from FAS OAuth
      responses:
        "200":
          description: PAGS session token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: fas_session missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid FAS session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/auth/github:
    post:
      summary: Direct GitHub OAuth exchange
      description: |
        Exchange a GitHub OAuth code for a PAGS token. Only works when PAGS has
        its own OAuth app configured. Prefer `/v1/auth/exchange` instead.
      operationId: githubAuth
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: GitHub OAuth authorization code
                return_to:
                  type: string
                  description: URL to redirect to after auth
      responses:
        "200":
          description: PAGS session token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
                  return_to:
                    type: string
        "401":
          description: OAuth failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          description: GitHub OAuth not configured on this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/auth/me:
    get:
      summary: Get current user
      description: Verify the current session and return the authenticated user's profile.
      operationId: getMe
      tags: [Auth]
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated or token expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update profile
      description: Update display name, bio, website, or Twitter handle.
      operationId: updateMe
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                bio:
                  type: string
                website:
                  type: string
                twitter:
                  type: string
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          description: Nothing to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Agents ────────────────────────────────────────────────────────────────

  /v1/agents/my/agents:
    get:
      summary: List my agents
      description: List all agents owned by the authenticated user, ordered by last update.
      operationId: listMyAgents
      tags: [Agents]
      responses:
        "200":
          description: Owned agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agents:
    get:
      summary: List published agents
      description: Browse published agents in the store. Filterable by category and sortable.
      operationId: listAgents
      security: []
      tags: [Agents]
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category slug
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, popular, name]
            default: newest
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Published agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentSummary"
    post:
      summary: Create agent
      description: Create a new agent. Requires the `creator` role. The agent is created as a draft.
      operationId: createAgent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, name]
              properties:
                slug:
                  type: string
                  pattern: "^[a-z0-9-]+$"
                  description: Unique URL-safe identifier
                name:
                  type: string
                description:
                  type: string
                category:
                  type: string
                  default: general
                icon:
                  type: string
                icon_bg:
                  type: string
                  example: "#7c3aed"
                model:
                  type: string
                  example: "@cf/meta/llama-3.2-3b-instruct"
                personality:
                  type: string
                  description: Initial personality prompt stored in the Durable Object
                goal:
                  type: string
                  description: Initial goal prompt stored in the Durable Object
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  slug:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Creator role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Slug already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agents/{id}:
    get:
      summary: Get agent
      description: |
        Get a single agent by ID or slug. Published agents are public.
        Draft agents are only visible to the owner or admins.
      operationId: getAgent
      security: []
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID or slug
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update agent
      description: Update agent metadata. Owner or admin only.
      operationId: updateAgent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                category:
                  type: string
                icon:
                  type: string
                icon_bg:
                  type: string
                model:
                  type: string
                visibility:
                  type: string
                  enum: [draft, published]
                cron_schedule:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          description: Nothing to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not your agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete agent
      description: Permanently delete an agent and all its executions/usage. Owner or admin only.
      operationId: deleteAgent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID
      responses:
        "200":
          description: Agent deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not your agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agents/{id}/clone:
    post:
      summary: Clone agent
      description: Fork a published agent as a new draft. Copies state, personality, and knowledge base. Requires `creator` role.
      operationId: cloneAgent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Source agent UUID or slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug:
                  type: string
                  pattern: "^[a-z0-9-]+$"
                  description: Slug for the cloned agent
      responses:
        "201":
          description: Clone created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  slug:
                    type: string
                  clonedFrom:
                    type: string
                    format: uuid
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Source agent not found or not published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Slug already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Chat ──────────────────────────────────────────────────────────────────

  /v1/agents/{id}/chat:
    post:
      summary: Send message to agent
      description: Send a chat message to the template agent's Durable Object. Tracks usage.
      operationId: chatWithAgent
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID or slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
      responses:
        "200":
          description: Agent reply
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
        "400":
          description: message required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agents/{id}/ws:
    get:
      summary: WebSocket chat connection
      description: |
        Upgrade to a WebSocket connection for real-time chat with the agent's Durable Object.
        Must send `Upgrade: websocket` header.
      operationId: agentWebSocket
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID or slug
        - name: Upgrade
          in: header
          required: true
          schema:
            type: string
            enum: [websocket]
      responses:
        "101":
          description: WebSocket upgrade successful
        "426":
          description: WebSocket upgrade required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agents/{id}/messages:
    get:
      summary: Get message history
      description: Retrieve the agent's conversation history from its Durable Object.
      operationId: getAgentMessages
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Message history
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"

  /v1/agents/{id}/memory:
    get:
      summary: Get agent memory
      operationId: getAgentMemory
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent memory entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  memory:
                    type: array
                    items:
                      type: object
    put:
      summary: Update agent memory
      operationId: updateAgentMemory
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Memory updated
          content:
            application/json:
              schema:
                type: object

  /v1/agents/{id}/tasks:
    get:
      summary: List agent tasks
      operationId: getAgentTasks
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
    post:
      summary: Create task
      operationId: createAgentTask
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                status:
                  type: string
                  enum: [pending, in_progress, done]
                  default: pending
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /v1/agents/{id}/state:
    get:
      summary: Get agent DO state
      description: Retrieve the Durable Object state (identity, personality, guardrails, etc.)
      operationId: getAgentState
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentState"
    put:
      summary: Update agent DO state
      description: Overwrite the agent's Durable Object state fields.
      operationId: updateAgentState
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentState"
      responses:
        "200":
          description: State updated
          content:
            application/json:
              schema:
                type: object

  /v1/agents/{id}/knowledge:
    get:
      summary: List knowledge documents
      operationId: getAgentKnowledge
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Knowledge base documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeDocument"
    post:
      summary: Add knowledge document
      operationId: addAgentKnowledge
      tags: [Chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
