name = "proagentstore-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[[routes]]
pattern = "api.proagentstore.online"
zone_name = "proagentstore.online"
custom_domain = true

[vars]
GITHUB_CLIENT_ID = ""  # Set after creating GitHub OAuth app

[[d1_databases]]
binding = "DB"
database_name = "pags"
database_id = "036f9349-4a2e-48f0-93a8-b5f185bc2572"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "pags-agents"

[[durable_objects.bindings]]
name = "AGENT"
class_name = "AgentDO"

[[migrations]]
tag = "v1"
new_classes = ["AgentDO"]

# Secrets (set via wrangler secret put + Doppler):
# GITHUB_CLIENT_SECRET
# SESSION_SIGNING_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
