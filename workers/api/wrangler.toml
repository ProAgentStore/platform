name = "proagentstore-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[[routes]]
pattern = "api.proagentstore.online"
zone_name = "proagentstore.online"
custom_domain = true

[vars]
GITHUB_CLIENT_ID = "Ov23lihFW7hnEXYHNmvK"  # ProAgentStore OAuth app (own — no FAS dependency)
GITHUB_ORG = "ProAgentStore"
# Master switch for platform-paid internal AI (knowledge embeddings + conversation
# summary). "true" = ON for ALL users (platform pays). Currently ON because Serge is
# the sole user. FLIP TO "false" (or remove) before onboarding real users → BYOK-only.
# LLM chat is always BYOK regardless.
PLATFORM_AI_ENABLED = "true"
# Billing (the $9/mo Pro subscription — lib/billing.ts):
# STRIPE_PRICE_ID = "price_…"   # $9/mo recurring price on the shared (test-mode) Stripe
#                               # account. Set together with the STRIPE_* secrets.
# PAYWALL_ENFORCE = "1"         # SOFT LAUNCH: leave unset until Stripe is wired + verified.
#                               # "1" enforces the free tier (2 agents, Pro-only runner).

[[d1_databases]]
binding = "DB"
database_name = "pags"
database_id = "036f9349-4a2e-48f0-93a8-b5f185bc2572"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "pags-agents"

[[durable_objects.bindings]]
name = "AGENT"
class_name = "AgentDO"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelayDO"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "pags-agents"
# REQUIRED metadata indexes — vectorSearch() filters by metadata.agentId, and Vectorize
# only filters on INDEXED metadata fields (an un-indexed filter silently returns nothing,
# which broke RAG platform-wide until 2026-07-05). If the index is ever recreated, run:
#   wrangler vectorize create-metadata-index pags-agents --property-name=agentId    --type=string
#   wrangler vectorize create-metadata-index pags-agents --property-name=sourceType --type=string
# (Metadata indexes only apply to vectors inserted AFTER creation — re-index existing content.)

# Remote LLM brain that drives the browser runner through a job application.
[[workflows]]
name = "pags-job-apply"
binding = "JOB_APPLY"
class_name = "JobApplyWorkflow"

# Remote LLM brain that drives a local coding CLI toward an objective (AgentCoder port).
[[workflows]]
name = "pags-coding-session"
binding = "CODING_SESSION"
class_name = "CodingSessionWorkflow"

[[migrations]]
tag = "v1"
new_classes = ["AgentDO"]

[[migrations]]
tag = "v2"
new_classes = ["RelayDO"]

# Secrets (set via wrangler secret put + Doppler):
# GITHUB_CLIENT_SECRET
# GITHUB_TOKEN
# SESSION_SIGNING_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# VAPID_PUBLIC_KEY  (Web Push, also non-secret — served via /v1/push/vapid-key)
# VAPID_PRIVATE_KEY (Web Push signing — secret)
# VAPID_SUBJECT     (mailto: contact)
# GITHUB_APP_ID          (coding workspace — GitHub App for repo access; optional)
# GITHUB_APP_PRIVATE_KEY (coding workspace — App private key PEM; optional)
# GITHUB_APP_SLUG        (coding workspace — App slug for install URLs; optional)
