name = "proagentstore-host"
main = "src/index.ts"
compatibility_date = "2026-01-01"
workers_dev = false

# Apex domain only — api.proagentstore.online is handled by the API worker
[[routes]]
pattern = "proagentstore.online/*"
zone_name = "proagentstore.online"

[[routes]]
pattern = "console.proagentstore.online/*"
zone_name = "proagentstore.online"

# Service binding to the API worker — same-zone subrequests bypass route-mapped
# Workers, so the sitemap's agent-list fetch must go through this, not a plain
# fetch() to api.proagentstore.online.
[[services]]
binding = "API"
service = "proagentstore-api"
